<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Points</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F7F3EC;--pink:#F2608A;--pk-l:#FDE8EF;--pk-d:#D94478;
  --olive:#7B8C4E;--ol-l:#EEF1E6;--blue:#7AA4C0;--bl-l:#E8F2F8;
  --ch:#2A2825;--ch2:#4A4742;--gr:#9E9B96;--gr-l:#EAE7E0;
  --sh:0 4px 20px rgba(42,40,37,.09);--sh2:0 8px 32px rgba(42,40,37,.13);
  --r:18px;--r2:28px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ch);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Fraunces',serif}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--cream)}
.pg{padding-bottom:86px}
.pg0{padding-bottom:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:var(--cream);position:sticky;top:0;z-index:50}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:900}.logo span{color:var(--pink)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--gr-l);display:flex;padding:7px 0 14px;z-index:100;box-shadow:0 -2px 12px rgba(42,40,37,.06)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0}
.ni-ic{font-size:20px;transition:transform .15s}.ni-lb{font-size:10px;font-weight:600;color:var(--gr)}
.ni.on .ni-ic{transform:scale(1.12)}.ni.on .ni-lb{color:var(--pink)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:11px 20px;border-radius:99px;border:none;cursor:pointer;transition:all .15s}
.bp{background:var(--pink);color:#fff;box-shadow:0 3px 12px rgba(242,96,138,.3)}.bp:hover{background:var(--pk-d)}
.bc{background:var(--ch);color:#fff}.bo{background:var(--olive);color:#fff}
.bg{background:var(--gr-l);color:var(--ch2)}.bsm{font-size:12px;padding:7px 13px}.bbl{width:100%;display:flex}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px}
.card-c{background:var(--ch);color:#fff}.card-p{background:var(--pink);color:#fff}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}
.bp2{background:var(--pk-l);color:var(--pk-d)}.bo2{background:var(--ol-l);color:var(--olive)}
.bb2{background:var(--bl-l);color:var(--blue)}.bg2{background:var(--gr-l);color:var(--gr)}
.bgreen{background:#E8F5E9;color:#2E7D32}.bred{background:#FFEBEE;color:#C62828}
.pbar{background:var(--gr-l);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:var(--pink);transition:width .5s ease}
.pf-o{background:var(--olive)}.pf-b{background:var(--blue)}
.sh{padding:8px 16px 4px;display:flex;align-items:center;justify-content:space-between}
.sh-t{font-family:'Fraunces',serif;font-size:16px;font-weight:700}.sh-l{font-size:12px;font-weight:600;color:var(--pink);cursor:pointer}
.cc{display:flex;align-items:center;gap:11px;background:#fff;border-radius:var(--r);padding:13px;margin:0 13px 9px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.cc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.cc-ic{font-size:24px;width:46px;height:46px;border-radius:13px;background:var(--gr-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cc-t{font-weight:600;font-size:14px;margin-bottom:1px}.cc-m{font-size:11px;color:var(--gr)}
.cc-pts{font-family:'Fraunces',serif;font-size:19px;font-weight:900;color:var(--pink)}
.rc{background:#fff;border-radius:var(--r);padding:15px;margin-bottom:9px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.rc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}.rc.lkd{opacity:.6}
.tabs{display:flex;padding:0 13px;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 15px;border-radius:99px;font-size:12px;font-weight:600;background:var(--gr-l);color:var(--ch2);cursor:pointer;white-space:nowrap;border:none;transition:all .15s}
.tab.on{background:var(--ch);color:#fff}
.tx{display:flex;align-items:center;gap:9px;padding:11px 16px;border-bottom:1px solid var(--gr-l)}
.tx-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-t{font-size:13px;font-weight:600}.tx-d{font-size:10px;color:var(--gr)}
.tx-amt{font-family:'Fraunces',serif;font-weight:900;font-size:16px}
.earn{color:var(--olive)}.spend{color:var(--pink)}
.mover{position:fixed;inset:0;background:rgba(42,40,37,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.mover.open{opacity:1;pointer-events:all}
.msheet{background:#fff;border-radius:var(--r2) var(--r2) 0 0;width:100%;max-width:430px;padding:18px 18px 34px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.mover.open .msheet{transform:translateY(0)}
.mh{width:34px;height:4px;background:var(--gr-l);border-radius:99px;margin:0 auto 16px}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ch);color:#fff;font-size:13px;font-weight:600;padding:9px 20px;border-radius:99px;z-index:400;opacity:0;transition:all .24s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cbox{position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden}
.cp{position:absolute;border-radius:2px;animation:cff 1.4s ease-in forwards}
@keyframes cff{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.inp{width:100%;padding:12px 14px;border-radius:var(--r);border:2px solid var(--gr-l);font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--pink)}
.tog{width:40px;height:22px;background:var(--gr-l);border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--olive)}.tok{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on .tok{left:21px}
.stat{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:13px;flex:1}
.stat-l{font-size:10px;font-weight:600;color:var(--gr);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.stat-v{font-family:'Fraunces',serif;font-size:26px;font-weight:900;line-height:1}
.sdots{display:flex;gap:5px;justify-content:center;margin-bottom:18px}
.sd{width:7px;height:7px;border-radius:99px;background:var(--gr-l);transition:all .2s}
.sd.on{background:var(--pink);width:20px}.sd.done{background:var(--olive)}
.fab{position:fixed;bottom:74px;right:calc(50% - 198px);width:50px;height:50px;border-radius:50%;background:var(--pink);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(242,96,138,.4);cursor:pointer;z-index:110;border:none;transition:all .15s}
.fab:hover{transform:scale(1.1) rotate(90deg)}
@media(max-width:430px){.fab{right:13px}}
.prhero{padding:20px 16px;display:flex;flex-direction:column;align-items:center;text-align:center}
.prav{width:68px;height:68px;border-radius:50%;font-size:32px;display:flex;align-items:center;justify-content:center;background:var(--pk-l);border:3px solid var(--pink);margin-bottom:9px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--gr-l)}
.chart-w{display:flex;align-items:flex-end;gap:4px;height:76px;margin-bottom:4px}
.cb{flex:1;border-radius:5px 5px 0 0;background:var(--pk-l);position:relative;cursor:pointer;transition:background .15s}
.cb:hover{background:var(--pink)}.cb-tip{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--ch2);white-space:nowrap}
.clabs{display:flex;gap:4px}.clab{flex:1;text-align:center;font-size:9px;color:var(--gr);font-weight:600}
.empty{padding:36px 18px;text-align:center}
.empty-ic{font-size:42px;margin-bottom:8px}.empty-t{font-family:'Fraunces',serif;font-size:17px;font-weight:700;margin-bottom:3px}.empty-s{font-size:12px;color:var(--gr)}
.och{padding:10px 16px;border-radius:99px;border:2px solid var(--gr-l);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;display:inline-block}
.och.on{border-color:var(--pink);background:var(--pk-l);color:var(--pk-d)}
.gc{background:#fff;border-radius:var(--r);padding:16px;margin:0 13px 11px;box-shadow:var(--sh)}
.acard{background:#fff;border-radius:var(--r);padding:15px;margin:0 13px 11px;box-shadow:var(--sh);border-left:3px solid var(--pink)}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 13px}
.feat-c{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app"></div>
<div class="mover" id="modal"><div class="msheet" id="msheet"></div></div>
<div class="toast" id="toast-el"></div>
<div class="cbox" id="cbox"></div>

<script>
// ===== STATE =====
var S = { page:'welcome', user:null, tab:'today', rtab:'All', ostep:0, selChore:'c1', togs:{n:true,a:true,s:false} };

// ===== DATA =====
var USERS = {
  parent:         { id:'parent',        name:'Alex',   av:'👨‍💼', role:'parent', level:null,streak:null,pts:null },
  'child-oliver': { id:'child-oliver',  name:'Oliver', av:'🧒',  role:'child',  level:5, streak:7, pts:320 },
  'child-luna':   { id:'child-luna',    name:'Luna',   av:'👧',  role:'child',  level:3, streak:3, pts:185 }
};
var CHORES = [
  {id:'c1',t:'Make Bed',    d:'Every morning before school',  p:5, cat:'Bedroom',freq:'daily', diff:'Easy',  ic:'🛏️',st:'pending',  due:'Today',   who:'child-oliver',ap:false},
  {id:'c2',t:'Tidy Room',   d:'Put everything in its place',  p:10,cat:'Bedroom',freq:'daily', diff:'Easy',  ic:'🧹',st:'pending',  due:'Today',   who:'child-oliver',ap:true},
  {id:'c3',t:'Wash Dishes', d:'Rinse and stack in dishwasher',p:15,cat:'Kitchen',freq:'daily', diff:'Medium',ic:'🍽️',st:'submitted',due:'Today',   who:'child-oliver',ap:true},
  {id:'c4',t:'Homework',    d:'All subjects complete',        p:20,cat:'School', freq:'daily', diff:'Hard',  ic:'📚',st:'pending',  due:'Today',   who:'child-oliver',ap:true},
  {id:'c5',t:'Feed Pet',    d:'Morning and evening feeding',  p:8, cat:'Pets',   freq:'daily', diff:'Easy',  ic:'🐾',st:'done',     due:'Today',   who:'child-luna',  ap:false},
  {id:'c6',t:'Water Plants',d:'Check soil and water if dry',  p:7, cat:'Garden', freq:'weekly',diff:'Easy',  ic:'🌿',st:'pending',  due:'Tomorrow',who:'child-luna',  ap:false}
];
var REWARDS = [
  {id:'r1',t:'$5 Allowance',      d:'Cash in your pocket!',        cost:100,cat:'Cash',  ic:'💵',badge:'Best Value'},
  {id:'r2',t:'30 Min Screen Time',d:'Extra gaming or video time',  cost:200,cat:'Screen',ic:'🎮',badge:'Popular'},
  {id:'r3',t:'Favorite Snack',    d:'Pick anything from the store',cost:300,cat:'Treats',ic:'🍕',badge:null},
  {id:'r4',t:'Family Movie Pick', d:"You choose tonight's movie!", cost:250,cat:'Family',ic:'🎬',badge:'Popular'},
  {id:'r5',t:'Small Toy',         d:'Up to $15 value toy',         cost:500,cat:'Toys',  ic:'🧸',badge:null}
];
var APPRS = [
  {id:'a1',cid:'c3',uid:'child-oliver',ct:'Wash Dishes',when:'2h ago', st:'pending',note:'All done! Dishes stacked.'},
  {id:'a2',cid:'c2',uid:'child-luna',  ct:'Tidy Room',  when:'30m ago',st:'pending',note:'Room looks great!'}
];
var TXS = [
  {id:'t1',type:'earn', t:'Make Bed',      amt:5,   date:'Today',     uid:'child-oliver',ic:'🛏️'},
  {id:'t2',type:'earn', t:'Homework Done', amt:20,  date:'Today',     uid:'child-oliver',ic:'📚'},
  {id:'t3',type:'bonus',t:'7-Day Streak!', amt:25,  date:'Yesterday', uid:'child-oliver',ic:'🔥'},
  {id:'t4',type:'spend',t:'$5 Allowance',  amt:-100,date:'Mon',       uid:'child-oliver',ic:'💵'},
  {id:'t5',type:'earn', t:'Tidy Room',     amt:10,  date:'Mon',       uid:'child-oliver',ic:'🧹'},
  {id:'t6',type:'earn', t:'Feed Pet',      amt:8,   date:'Today',     uid:'child-luna',  ic:'🐾'}
];
var GOALS = [
  {id:'g1',t:'Lego Set',      target:500,cur:320,cat:'Toys',  ic:'🧱',dl:'3 weeks'},
  {id:'g2',t:'Birthday Treat',target:300,cur:185,cat:'Treats',ic:'🎂',dl:'1 week'}
];
var WEEK = [{d:'Mon',v:35},{d:'Tue',v:20},{d:'Wed',v:55},{d:'Thu',v:15},{d:'Fri',v:45},{d:'Sat',v:30},{d:'Sun',v:25}];

// ===== UTILS =====
function go(pg, uid) {
  if (uid !== undefined) S.user = (uid === 'null' || uid === null) ? null : uid;
  S.page = pg;
  draw();
  window.scrollTo(0,0);
}
function pct(a,b){ return !b?0:Math.min(100,Math.round(a/b*100)); }
function showToast(msg, ic) {
  var el = document.getElementById('toast-el');
  el.textContent = (ic||'✅')+' '+msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2400);
}
function showConfetti() {
  var box=document.getElementById('cbox'), cols=['#F2608A','#7B8C4E','#7AA4C0','#F7F3EC','#2A2825'];
  box.innerHTML='';
  for(var i=0;i<34;i++){var p=document.createElement('div');p.className='cp';p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*5)];p.style.animationDelay=Math.random()*.6+'s';p.style.animationDuration=(1.1+Math.random()*.6)+'s';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';box.appendChild(p);}
  setTimeout(function(){box.innerHTML='';},2800);
}
function openModal(html){document.getElementById('msheet').innerHTML='<div class="mh"></div>'+html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
window.closeModal=closeModal;window.showToast=showToast;

// ===== DRAW =====
function draw() {
  var app=document.getElementById('app');
  var u=S.user?USERS[S.user]:null;
  var isChild=u&&u.role==='child', isParent=u&&u.role==='parent';
  var noBot=S.page==='welcome'||S.page==='onboarding';
  var html='';
  if(!noBot){html+=topBar(u);}
  html+='<div class="'+(noBot?'pg0':'pg')+'">';
  switch(S.page){
    case'welcome':    html+=pWelcome();break;
    case'onboarding': html+=pOnboard();break;
    case'child-home': html+=pChildHome(u);break;
    case'parent-home':html+=pParentHome(u);break;
    case'chores':     html+=pChores(u);break;
    case'chore-detail':html+=pChoreDetail();break;
    case'approvals':  html+=pApprovals();break;
    case'rewards':    html+=pRewards(u);break;
    case'progress':   html+=pProgress(u);break;
    case'goals':      html+=pGoals();break;
    case'profile':    html+=pProfile(u);break;
    default:          html+=p404();
  }
  html+='</div>';
  if(isChild) html+=bNav();
  if(isParent) html+='<button class="fab" id="fabBtn">+</button>';
  app.innerHTML=html;
  bindAll();
  setTimeout(fixBars,20);
}

function fixBars(){
  document.querySelectorAll('[data-bh]').forEach(function(b){b.style.height=b.getAttribute('data-bh')+'px';});
}

// ===== BIND ALL =====
function bindAll(){
  // modal close
  var mo=document.getElementById('modal');
  if(mo) mo.onclick=function(e){if(e.target===mo)closeModal();};
  // FAB
  var fab=document.getElementById('fabBtn');
  if(fab) fab.onclick=function(){addChoreModal();};
  // submit chore
  var sb=document.getElementById('sub-btn');
  if(sb) sb.onclick=doSubmit;
  // approve/reject all
  var aa=document.getElementById('appr-all');
  if(aa) aa.onclick=doApproveAll;
  // ob buttons
  var obc=document.getElementById('obc');if(obc) obc.onclick=function(){if(S.ostep<3){S.ostep++;draw();}else go('parent-home','parent');};
  var obb=document.getElementById('obb');if(obb) obb.onclick=function(){S.ostep--;draw();};
  // parent-home quick add
  var qac=document.getElementById('qaChore');if(qac) qac.onclick=addChoreModal;
  // data-* attributes
  document.querySelectorAll('[data-go]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();var p=el.getAttribute('data-go').split('|');go(p[0],p[1]);});
  });
  document.querySelectorAll('[data-tab]').forEach(function(el){
    el.addEventListener('click',function(){S.tab=el.getAttribute('data-tab');draw();});
  });
  document.querySelectorAll('[data-rtab]').forEach(function(el){
    el.addEventListener('click',function(){S.rtab=el.getAttribute('data-rtab');draw();});
  });
  document.querySelectorAll('[data-chore]').forEach(function(el){
    el.addEventListener('click',function(){S.selChore=el.getAttribute('data-chore');go('chore-detail');});
  });
  document.querySelectorAll('[data-apr]').forEach(function(el){
    el.addEventListener('click',function(){doApprove(el.getAttribute('data-apr'));});
  });
  document.querySelectorAll('[data-rej]').forEach(function(el){
    el.addEventListener('click',function(){doReject(el.getAttribute('data-rej'));});
  });
  document.querySelectorAll('[data-rwd]').forEach(function(el){
    el.addEventListener('click',function(){rewardModal(el.getAttribute('data-rwd'));});
  });
  document.querySelectorAll('[data-tog]').forEach(function(el){
    el.addEventListener('click',function(){var k=el.getAttribute('data-tog');S.togs[k]=!S.togs[k];draw();});
  });
  document.querySelectorAll('[data-sw]').forEach(function(el){
    el.addEventListener('click',function(){var uid=el.getAttribute('data-sw');var u2=USERS[uid];go(u2.role==='parent'?'parent-home':'child-home',uid);});
  });
  document.querySelectorAll('.och').forEach(function(el){
    el.addEventListener('click',function(){var g=el.getAttribute('data-grp');document.querySelectorAll('[data-grp="'+g+'"]').forEach(function(x){x.classList.remove('on');});el.classList.add('on');});
  });
  document.querySelectorAll('[data-ipick]').forEach(function(el){
    el.addEventListener('click',function(){document.querySelectorAll('[data-ipick]').forEach(function(x){x.style.background='var(--gr-l)';x.style.outline='none';});el.style.background='var(--pk-l)';el.style.outline='2px solid var(--pink)';});
  });
}

// ===== ACTIONS =====
function doSubmit(){
  var c=CHORES.find(function(x){return x.id===S.selChore;});
  if(!c||c.st==='done'||c.st==='submitted') return;
  if(c.ap){
    c.st='submitted';
    var note=document.getElementById('cnote');
    APPRS.push({id:'a'+Date.now(),cid:c.id,uid:S.user||'child-oliver',ct:c.t,when:'Just now',st:'pending',note:note?note.value:''});
    showToast('Submitted for approval!','📋');
  } else {
    c.st='done';
    var u=USERS[S.user||'child-oliver'];if(u) u.pts=(u.pts||0)+c.p;
    TXS.unshift({id:'t'+Date.now(),type:'earn',t:c.t,amt:c.p,date:'Just now',uid:S.user||'child-oliver',ic:c.ic});
    showToast('Nice work! +'+c.p+' pts','🌟');showConfetti();
  }
  go('chores');
}
function doApprove(id){
  var a=APPRS.find(function(x){return x.id===id;});if(!a||a.st!=='pending') return;
  a.st='approved';var c=CHORES.find(function(x){return x.id===a.cid;});
  if(c){c.st='done';var u=USERS[a.uid];if(u) u.pts=(u.pts||0)+c.p;TXS.unshift({id:'tx'+Date.now(),type:'earn',t:c.t,amt:c.p,date:'Just now',uid:a.uid,ic:c.ic});}
  showToast('Approved! +'+(c?c.p:0)+' pts','⭐');showConfetti();draw();
}
function doReject(id){
  var a=APPRS.find(function(x){return x.id===id;});if(!a) return;a.st='rejected';
  var c=CHORES.find(function(x){return x.id===a.cid;});if(c) c.st='pending';
  showToast('Sent back to try again','🔄');draw();
}
function doApproveAll(){APPRS.filter(function(a){return a.st==='pending';}).forEach(function(a){doApprove(a.id);});}
function doRedeem(id){
  var r=REWARDS.find(function(x){return x.id===id;});if(!r) return;
  var u=USERS[S.user];if(!u||u.role!=='child'||u.pts<r.cost) return;
  u.pts-=r.cost;TXS.unshift({id:'tx'+Date.now(),type:'spend',t:r.t,amt:-r.cost,date:'Just now',uid:S.user,ic:r.ic});
  closeModal();showToast('Enjoy your reward!',r.ic);showConfetti();draw();
}
window.doRedeem=doRedeem;
function rewardModal(id){
  var r=REWARDS.find(function(x){return x.id===id;});if(!r) return;

    '<div class="tabs">'+['today','upcoming','completed'].map(function(t){return'<button class="tab '+(S.tab===t?'on':'')+'" data-tab="'+t+'">'+ t.charAt(0).toUpperCase()+t.slice(1)+'</button>';}).join('')+'</div>'+
    (!list.length?'<div class="empty"><div class="empty-ic">🎉</div><div class="empty-t">All done!</div><div class="empty-s">No chores here right now.</div></div>':
      list.map(function(c){var u2=USERS[c.who];return'<div class="cc" data-chore="'+c.id+'"><div class="cc-ic" style="background:'+(c.st==='done'?'var(--ol-l)':'var(--gr-l)')+'">'+c.ic+'</div><div style="flex:1"><div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><span class="cc-t">'+c.t+'</span><span class="badge '+(c.diff==='Easy'?'bgreen':c.diff==='Hard'?'bred':'bb2')+'">'+c.diff+'</span></div><div class="cc-m">'+c.d+'</div><div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap"><span class="badge bg2">'+c.freq+'</span><span class="badge bo2">'+c.cat+'</span>'+(iP?'<span class="badge bb2">'+(u2?u2.name:'')+'</span>':'')+'</div></div><div style="text-align:right"><div class="cc-pts">'+c.p+'</div><div style="font-size:9px;color:var(--gr)">pts</div>'+(c.st==='done'?'<div style="font-size:13px;margin-top:2px">✅</div>':'')+'</div></div>';}).join(''))+
  '</div>';
}

function pChoreDetail(){
  var c=CHORES.find(function(x){return x.id===S.selChore;})||CHORES[0];
  var done=c.st==='done'||c.st==='submitted';
  return '<div style="padding:14px 14px 0">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
      '<div style="font-size:40px;width:66px;height:66px;background:var(--gr-l);border-radius:16px;display:flex;align-items:center;justify-content:center">'+c.ic+'</div>'+
      '<div><h1 style="font-size:22px;font-weight:900;line-height:1.1">'+c.t+'</h1><div style="margin-top:4px;display:flex;gap:4px"><span class="badge bp2">★ '+c.p+' pts</span><span class="badge bg2">'+c.freq+'</span></div></div>'+
    '</div>'+
    '<div class="card" style="background:var(--ol-l);margin-bottom:12px">'+
      '<div style="font-size:10px;font-weight:700;color:var(--olive);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px">Instructions</div>'+
      '<p style="font-size:13px;line-height:1.6;color:var(--ch2)">'+c.d+'</p>'+
      '<ul style="margin-top:7px;padding-left:15px;font-size:12px;color:var(--ch2);line-height:2"><li>Take your time and do it right</li><li>Ask for help if you need it</li><li>Check it\'s done before submitting</li></ul>'+
    '</div>'+
    '<div style="background:var(--gr-l);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px;border:2px dashed var(--gr);cursor:pointer" onclick="showToast(\'Photo upload coming soon!\',\'📸\')">'+
      '<div style="font-size:24px;margin-bottom:3px">📸</div><div style="font-size:12px;font-weight:600;color:var(--gr)">Add a photo (optional)</div>'+
    '</div>'+
    '<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px">Add a note</label><textarea id="cnote" placeholder="e.g. All done! Checked twice." style="width:100%;padding:11px;border-radius:var(--r);border:2px solid var(--gr-l);font-family:DM Sans,sans-serif;font-size:13px;resize:none;height:76px;outline:none" onfocus="this.style.borderColor=\'var(--pink)\'" onblur="this.style.borderColor=\'var(--gr-l)\'"></textarea></div>'+
    (done?'<div style="background:var(--ol-l);border-radius:var(--r);padding:16px;text-align:center"><div style="font-size:24px;margin-bottom:3px">⏳</div><div style="font-weight:700;font-size:14px">Waiting for approval</div><div style="font-size:12px;color:var(--gr);margin-top:2px">Your parent will review soon!</div></div>':
      '<button id="sub-btn" class="btn bp bbl" style="font-size:15px;padding:14px">✅ Mark as Done — '+c.p+' pts</button>')+
  '</div>';
}

function pApprovals(){
  var pending=APPRS.filter(function(a){return a.st==='pending';});
  return '<div>'+
    '<div style="padding:13px 16px 11px"><h1 style="font-size:24px;font-weight:900">Approvals</h1><p style="color:var(--gr);font-size:12px;margin-top:2px">'+pending.length+' waiting for you</p></div>'+
    (!pending.length?'<div class="empty"><div class="empty-ic">🎉</div><div class="empty-t">All caught up!</div><div class="empty-s">No pending approvals.</div></div>':
      pending.map(function(a){var ch=USERS[a.uid],c=CHORES.find(function(x){return x.id===a.cid;});return'<div class="acard"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:19px">'+(ch?ch.av:'👤')+'</span><div><div style="font-weight:700;font-size:13px">'+(ch?ch.name:'')+' — <em>'+a.ct+'</em></div><div style="font-size:10px;color:var(--gr);margin-top:1px">'+a.when+'</div></div><span class="badge bp2" style="margin-left:auto">+'+(c?c.p:0)+' pts</span></div>'+(a.note?'<div style="background:var(--gr-l);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--ch2);margin-bottom:9px">"'+a.note+'"</div>':'')+'<div style="display:flex;gap:7px"><button class="btn bp" style="flex:2;font-size:12px;padding:9px" data-apr="'+a.id+'">✓ Approve</button><button class="btn bg" style="flex:1;font-size:12px;padding:9px" data-rej="'+a.id+'">✗ Reject</button></div></div>';}).join('')+
      (pending.length>1?'<div style="padding:0 13px 13px"><button class="btn bo bbl" id="appr-all">✓ Approve All</button></div>':'')+
    '')+
  '</div>';
}

function pRewards(u){
  var bal=u&&u.role==='child'?u.pts:320;
  var cats=['All','Cash','Screen','Treats','Family','Toys'];
  var list=S.rtab==='All'?REWARDS:REWARDS.filter(function(r){return r.cat===S.rtab;});
  return '<div>'+
    '<div style="padding:13px 16px 0"><h1 style="font-size:24px;font-weight:900">Reward Store</h1></div>'+
    '<div style="padding:9px 13px 0"><div class="card card-c" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px"><div><div style="font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.4px">Your Balance</div><div style="font-family:Fraunces,serif;font-size:30px;font-weight:900"><span style="color:var(--pink)">★</span> '+bal+'</div></div><button class="btn bp bsm" data-go="goals">Set Goal 🎯</button></div></div>'+
    '<div class="tabs" style="margin-top:12px">'+cats.map(function(t){return'<button class="tab '+(S.rtab===t?'on':'')+'" data-rtab="'+t+'">'+t+'</button>';}).join('')+'</div>'+
    '<div style="padding:0 13px">'+list.map(function(r){var can=bal>=r.cost;return'<div class="rc '+(can?'':'lkd')+'" data-rwd="'+r.id+'"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px"><div style="font-size:34px">'+r.ic+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">'+(r.badge?'<span class="badge bp2">'+r.badge+'</span>':'')+(!can?'<span class="badge bg2">🔒 Need '+(r.cost-bal)+' more</span>':'')+'</div></div><div style="font-weight:700;font-size:13px;margin-bottom:2px">'+r.t+'</div><div style="font-size:11px;color:var(--gr);margin-bottom:9px">'+r.d+'</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-family:Fraunces,serif;font-size:17px;font-weight:900"><span style="color:var(--pink)">★</span> '+r.cost+'</div><button class="btn '+(can?'bp':'bg')+' bsm">'+(can?'Redeem':'Locked')+'</button></div><div class="pbar" style="height:5px"><div class="pf '+(can?'pf-o':'')+'" style="width:'+(can?100:pct(bal,r.cost))+'%"></div></div></div>';}).join('')+'</div>'+
  '</div>';
}

function pProgress(u){
  var uid=u?u.id:'child-oliver';
  var myTx=TXS.filter(function(t){return t.uid===uid;});
  var earned=myTx.filter(function(t){return t.type!=='spend';}).reduce(function(s,t){return s+t.amt;},0);
  var spent=myTx.filter(function(t){return t.type==='spend';}).reduce(function(s,t){return s+Math.abs(t.amt);},0);
  var mx=Math.max.apply(null,WEEK.map(function(d){return d.v;}));
  return '<div>'+
    '<div style="padding:13px 16px 11px"><h1 style="font-size:24px;font-weight:900">Progress</h1></div>'+
    '<div style="display:flex;gap:9px;padding:0 13px 12px">'+
      '<div class="stat"><div class="stat-l">Earned</div><div class="stat-v" style="color:var(--olive)">+'+earned+'</div><div style="font-size:9px;color:var(--gr)">pts</div></div>'+
      '<div class="stat"><div class="stat-l">Spent</div><div class="stat-v" style="color:var(--pink)">'+spent+'</div><div style="font-size:9px;color:var(--gr)">pts</div></div>'+
      '<div class="stat"><div class="stat-l">Streak</div><div class="stat-v">🔥'+(u&&u.streak||7)+'</div><div style="font-size:9px;color:var(--gr)">days</div></div>'+
    '</div>'+
    '<div class="card" style="margin:0 13px 12px">'+
      '<div style="font-weight:700;font-size:13px;margin-bottom:12px">This Week</div>'+
      '<div class="chart-w">'+WEEK.map(function(d){var h=Math.max(4,Math.round(d.v/mx*72));return'<div class="cb" data-bh="'+h+'" style="height:4px"><div class="cb-tip">'+d.v+'</div></div>';}).join('')+'</div>'+
      '<div class="clabs">'+WEEK.map(function(d){return'<div class="clab">'+d.d+'</div>';}).join('')+'</div>'+
    '</div>'+
    '<div class="sh"><span class="sh-t">Badges</span></div>'+
    '<div style="padding:4px 13px 12px;display:flex;gap:9px;flex-wrap:wrap">'+[['🔥','7-Day Streak'],['⭐','10 Chores'],['💰','First Redeem'],['🏆','Top Earner'],['🌿','Eco Champ']].map(function(b){return'<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:var(--gr-l);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--sh)">'+b[0]+'</div><div style="font-size:9px;font-weight:600;color:var(--gr);text-align:center;max-width:48px">'+b[1]+'</div></div>';}).join('')+'</div>'+
    '<div class="sh"><span class="sh-t">History</span></div>'+
    '<div style="background:#fff;border-radius:var(--r);margin:4px 13px 12px;box-shadow:var(--sh);overflow:hidden">'+myTx.map(function(t){return'<div class="tx"><div class="tx-ic" style="background:'+(t.type==='spend'?'var(--pk-l)':'var(--ol-l)')+'">'+t.ic+'</div><div style="flex:1"><div class="tx-t">'+t.t+'</div><div class="tx-d">'+t.date+'</div></div><div class="tx-amt '+(t.type==='spend'?'spend':'earn')+'">'+(t.amt>0?'+':'')+t.amt+'</div></div>';}).join('')+'</div>'+
  '</div>';
}

function pGoals(){
  return '<div>'+
    '<div style="padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between"><h1 style="font-size:24px;font-weight:900">Savings Goals</h1><button class="btn bp bsm" onclick="showToast(\'Goal builder coming soon!\',\'🎯\')">+ New</button></div>'+
    '<div style="padding:0 13px 12px"><div class="card card-c" style="padding:16px"><div style="font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px">My Point Budget</div><div style="display:flex;gap:9px">'+[['🪙','Save','50%',160],['💸','Spend','35%',112],['🤝','Give','15%',48]].map(function(j){return'<div style="flex:1;background:rgba(255,255,255,.1);border-radius:11px;padding:10px;text-align:center"><div style="font-size:21px;margin-bottom:3px">'+j[0]+'</div><div style="font-size:10px;opacity:.7;margin-bottom:1px">'+j[1]+'</div><div style="font-family:Fraunces,serif;font-size:15px;font-weight:900">'+j[3]+'</div><div style="font-size:9px;opacity:.45">'+j[2]+'</div></div>';}).join('')+'</div></div></div>'+
    GOALS.map(function(g){var p=pct(g.cur,g.target);return'<div class="gc"><div style="font-size:24px;margin-bottom:6px">'+g.ic+'</div><div style="font-weight:700;font-size:14px;margin-bottom:2px">'+g.t+'</div><div style="font-size:11px;color:var(--gr);margin-bottom:9px">'+g.cat+' · Due in '+g.dl+'</div><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:6px"><span style="color:var(--ch2)">'+g.cur+' / '+g.target+' pts</span><span style="color:var(--pink)">'+(g.target-g.cur)+' to go</span></div><div class="pbar" style="height:7px"><div class="pf" style="width:'+p+'%"></div></div><div style="margin-top:5px;font-size:11px;color:var(--gr)">'+p+'% there · Keep going! 💪</div></div>';}).join('')+
  '</div>';
}

function pProfile(u){
  if(!u) return'<div class="empty"><div class="empty-ic">👤</div><div class="empty-t">No user selected</div></div>';
  var isC=u.role==='child';
  return '<div>'+
    '<div class="prhero"><div class="prav">'+u.av+'</div><div style="font-family:Fraunces,serif;font-size:20px;font-weight:900">'+u.name+'</div><div style="font-size:10px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px">'+(isC?'Level '+u.level+' · '+u.streak+' day streak':'Parent · Admin')+'</div>'+(isC?'<div style="margin-top:9px;display:flex;gap:7px"><span class="badge bp2">★ '+u.pts+' pts</span><span class="badge bo2">🔥 '+u.streak+' days</span></div>':'')+'</div>'+
    '<div style="background:#fff;margin:0 13px 12px;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden">'+[['n','🔔 Notifications'],['a','📋 Approval Alerts'],['s','🔥 Streak Alerts']].map(function(row){var k=row[0],on=S.togs[k];return'<div class="srow"><span style="font-size:13px;font-weight:500">'+row[1]+'</span><div class="tog '+(on?'on':'')+'" data-tog="'+k+'"><div class="tok"></div></div></div>';}).join('')+'</div>'+
    '<div style="background:#fff;margin:0 13px 12px;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden"><div class="srow" style="cursor:pointer" onclick="showToast(\'Coming soon!\',\'✏️\')"><span style="font-size:13px;font-weight:500">✏️ Edit Profile</span><span style="color:var(--gr)">→</span></div><div class="srow" style="cursor:pointer" onclick="showToast(\'Coming soon!\',\'💡\')"><span style="font-size:13px;font-weight:500">💰 Points Conversion</span><span style="color:var(--gr)">→</span></div><div class="srow" style="cursor:pointer" data-go="onboarding"><span style="font-size:13px;font-weight:500">⚙️ Household Setup</span><span style="color:var(--gr)">→</span></div></div>'+
    '<div style="background:#fff;margin:0 13px 12px;border-radius:var(--r);box-shadow:var(--sh);padding:13px"><div style="font-size:10px;font-weight:600;color:var(--gr);text-transform:uppercase;letter-spacing:.3px;margin-bottom:9px">Switch User</div><div style="display:flex;flex-direction:column;gap:6px">'+Object.values(USERS).map(function(usr){return'<button class="btn '+(usr.id===u.id?'bp':'bg')+' bbl bsm" data-sw="'+usr.id+'">'+usr.av+' '+usr.name+(usr.role==='parent'?' (Parent)':'')+'</button>';}).join('')+'</div></div>'+
    '<div style="padding:0 13px 14px;text-align:center"><button class="btn bg bsm" data-go="welcome|null" style="color:var(--pink)">← Back to Welcome</button></div>'+
  '</div>';
}

function p404(){
  return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:36px 18px;text-align:center">'+
    '<div style="font-size:58px;margin-bottom:12px">🤔</div>'+
    '<h1 style="font-size:26px;font-weight:900;margin-bottom:7px">Hmm, lost?</h1>'+
    '<p style="color:var(--gr);margin-bottom:22px">This page doesn\'t exist yet.</p>'+
    '<button class="btn bp" data-go="welcome">← Go Home</button>'+
  '</div>';
}

// ===== INIT =====
draw();
</script>
</body>
</html>

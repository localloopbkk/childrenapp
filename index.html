<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Points</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EC;
    --pink: #F2608A;
    --pink-light: #FDE8EF;
    --pink-dark: #D94478;
    --olive: #7B8C4E;
    --olive-light: #EEF1E6;
    --blue: #7AA4C0;
    --blue-light: #E8F2F8;
    --charcoal: #2A2825;
    --charcoal-mid: #4A4742;
    --gray: #9E9B96;
    --gray-light: #EAE7E0;
    --white: #FFFFFF;
    --shadow: 0 4px 24px rgba(42,40,37,0.10);
    --shadow-md: 0 8px 32px rgba(42,40,37,0.13);
    --radius: 20px;
    --radius-lg: 28px;
    --radius-xl: 36px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { font-family: 'Fraunces', serif; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 430px; margin: 0 auto; position: relative; background: var(--cream); }
  .page { flex: 1; padding: 0 0 100px; overflow-y: auto; }
  .page.no-bottom { padding-bottom: 0; }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    background: var(--cream);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 900; color: var(--charcoal); letter-spacing: -0.5px; }
  .topbar-logo span { color: var(--pink); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .points-badge {
    background: var(--charcoal); color: #fff;
    font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 99px;
    display: flex; align-items: center; gap: 5px;
  }
  .points-badge .star { color: var(--pink); font-size: 14px; }
  .avatar-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--olive-light); border: 2px solid var(--olive);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; transition: transform .15s;
  }
  .avatar-btn:hover { transform: scale(1.08); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white); border-top: 1px solid var(--gray-light);
    display: flex; padding: 10px 0 18px;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(42,40,37,0.07);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: all .15s; padding: 2px 0;
  }
  .nav-icon { font-size: 22px; transition: transform .15s; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--gray); letter-spacing: 0.3px; }
  .nav-item.active .nav-icon { transform: scale(1.15); }
  .nav-item.active .nav-label { color: var(--pink); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px;
    padding: 14px 24px; border-radius: 99px; border: none; cursor: pointer;
    transition: all .18s; text-decoration: none;
  }
  .btn-primary { background: var(--pink); color: #fff; box-shadow: 0 4px 16px rgba(242,96,138,0.35); }
  .btn-primary:hover { background: var(--pink-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--charcoal); color: #fff; }
  .btn-secondary:hover { opacity: .85; transform: translateY(-1px); }
  .btn-ghost { background: var(--gray-light); color: var(--charcoal-mid); }
  .btn-ghost:hover { background: var(--gray); color: #fff; }
  .btn-olive { background: var(--olive); color: #fff; }
  .btn-sm { font-size: 13px; padding: 8px 16px; }
  .btn-block { width: 100%; display: flex; }

  /* CARDS */
  .card {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin: 0 16px 16px;
  }
  .card-pink { background: var(--pink); color: #fff; }
  .card-olive { background: var(--olive); color: #fff; }
  .card-blue { background: var(--blue); color: #fff; }
  .card-charcoal { background: var(--charcoal); color: #fff; }

  /* PROGRESS BAR */
  .progress-track { background: var(--gray-light); border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--pink); transition: width .6s cubic-bezier(.4,0,.2,1); }
  .progress-fill.olive { background: var(--olive); }
  .progress-fill.blue { background: var(--blue); }

  /* BADGE / PILL */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .badge-pink { background: var(--pink-light); color: var(--pink-dark); }
  .badge-olive { background: var(--olive-light); color: var(--olive); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .badge-gray { background: var(--gray-light); color: var(--gray); }
  .badge-green { background: #E8F5E9; color: #2E7D32; }
  .badge-red { background: #FFEBEE; color: #C62828; }

  /* STAT CARD */
  .stat-card {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px; flex: 1; min-width: 0;
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 900; line-height: 1; }

  /* SECTION HEADER */
  .section-header { padding: 8px 20px 4px; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
  .section-link { font-size: 13px; font-weight: 600; color: var(--pink); cursor: pointer; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(42,40,37,0.5);
    z-index: 500; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--white); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    width: 100%; max-width: 430px; padding: 24px 24px 40px;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--gray-light); border-radius: 99px; margin: 0 auto 20px; }

  /* TOAST */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--charcoal); color: #fff; font-size: 14px; font-weight: 600;
    padding: 12px 24px; border-radius: 99px; z-index: 600;
    opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONFETTI */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 700; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 1.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
  @keyframes pop { 0%{transform:scale(.8);opacity:0;} 70%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
  .anim-fade-up { animation: fadeUp .4s ease forwards; }
  .anim-pop { animation: pop .4s cubic-bezier(.4,0,.2,1) forwards; }

  /* BLOB MASCOT */
  .blob { border-radius: 60% 40% 55% 45% / 45% 55% 45% 55%; display: inline-flex; align-items: center; justify-content: center; }

  /* PAGE-SPECIFIC */
  .hero-headline { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 900; line-height: 1.05; letter-spacing: -1px; }
  .hero-sub { font-size: 16px; color: var(--charcoal-mid); line-height: 1.6; margin: 12px 0 28px; }

  /* CHORE CARD */
  .chore-card {
    display: flex; align-items: center; gap: 14px;
    background: #fff; border-radius: var(--radius); padding: 16px;
    margin: 0 16px 12px; box-shadow: var(--shadow);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .chore-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .chore-icon { font-size: 28px; width: 52px; height: 52px; border-radius: 16px; background: var(--gray-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chore-info { flex: 1; min-width: 0; }
  .chore-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .chore-meta { font-size: 12px; color: var(--gray); }
  .chore-points { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 900; color: var(--pink); white-space: nowrap; }

  /* REWARD CARD */
  .reward-card {
    background: #fff; border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
    box-shadow: var(--shadow); cursor: pointer; transition: all .15s; position: relative; overflow: hidden;
  }
  .reward-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .reward-card.locked { opacity: .65; }
  .reward-emoji { font-size: 36px; margin-bottom: 10px; }
  .reward-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .reward-desc { font-size: 12px; color: var(--gray); margin-bottom: 10px; }
  .reward-cost { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 900; color: var(--charcoal); display: flex; align-items: center; gap: 4px; }
  .reward-cost .star { color: var(--pink); }

  /* TABS */
  .tab-bar { display: flex; padding: 0 16px; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-pill {
    padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
    background: var(--gray-light); color: var(--charcoal-mid); cursor: pointer;
    white-space: nowrap; transition: all .15s; border: none;
  }
  .tab-pill.active { background: var(--charcoal); color: #fff; }

  /* TRANSACTION ROW */
  .tx-row { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--gray-light); }
  .tx-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-info { flex: 1; }
  .tx-title { font-size: 14px; font-weight: 600; }
  .tx-date { font-size: 11px; color: var(--gray); }
  .tx-amount { font-family: 'Fraunces', serif; font-weight: 900; font-size: 18px; }
  .tx-earn { color: var(--olive); }
  .tx-spend { color: var(--pink); }

  /* GOAL CARD */
  .goal-card { background: #fff; border-radius: var(--radius); padding: 20px; margin: 0 16px 14px; box-shadow: var(--shadow); }
  .goal-emoji { font-size: 28px; margin-bottom: 8px; }
  .goal-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .goal-meta { font-size: 12px; color: var(--gray); margin-bottom: 12px; }

  /* SETTINGS */
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-light); }
  .settings-label { font-size: 15px; font-weight: 500; }
  .toggle { width: 44px; height: 24px; background: var(--gray-light); border-radius: 99px; position: relative; cursor: pointer; transition: background .2s; }
  .toggle.on { background: var(--olive); }
  .toggle-knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
  .toggle.on .toggle-knob { left: 23px; }

  /* EMPTY STATE */
  .empty-state { padding: 40px 20px; text-align: center; }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--gray); }

  /* PROFILE CARD */
  .profile-hero { padding: 24px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .profile-avatar { width: 80px; height: 80px; border-radius: 50%; font-size: 38px; display: flex; align-items: center; justify-content: center; background: var(--pink-light); border: 3px solid var(--pink); margin-bottom: 12px; }
  .profile-name { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 900; }
  .profile-role { font-size: 13px; color: var(--gray); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* APPROVAL CARD */
  .approval-card { background: #fff; border-radius: var(--radius); padding: 18px; margin: 0 16px 14px; box-shadow: var(--shadow); border-left: 4px solid var(--pink); }
  .approval-meta { font-size: 12px; color: var(--gray); margin: 4px 0 12px; }
  .approval-actions { display: flex; gap: 10px; }

  /* ONBOARDING */
  .step-indicator { display: flex; gap: 6px; justify-content: center; padding: 8px 0 20px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-light); transition: all .2s; }
  .step-dot.active { background: var(--pink); width: 24px; border-radius: 99px; }
  .step-dot.done { background: var(--olive); }
  .onboarding-input {
    width: 100%; padding: 14px 18px; border-radius: var(--radius); border: 2px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif; font-size: 16px; background: #fff;
    transition: border-color .2s; outline: none;
  }
  .onboarding-input:focus { border-color: var(--pink); }
  .option-chip {
    padding: 12px 20px; border-radius: 99px; border: 2px solid var(--gray-light);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
    background: #fff;
  }
  .option-chip.selected { border-color: var(--pink); background: var(--pink-light); color: var(--pink-dark); }

  /* CHART */
  .chart-bar-wrap { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .chart-bar { flex: 1; border-radius: 6px 6px 0 0; background: var(--pink-light); position: relative; transition: height .5s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  .chart-bar:hover { background: var(--pink); }
  .chart-bar .bar-tip { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 700; color: var(--charcoal-mid); white-space: nowrap; }
  .chart-labels { display: flex; gap: 6px; margin-top: 4px; }
  .chart-label { flex: 1; text-align: center; font-size: 10px; color: var(--gray); font-weight: 600; }

  /* NOT FOUND */
  .notfound { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 40px 20px; text-align: center; }

  /* WELCOME */
  .welcome-page { padding: 0 0 40px; }
  .welcome-hero { padding: 40px 24px 32px; }
  .feature-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; margin-top: 20px; }
  .feature-card { background: #fff; border-radius: var(--radius); padding: 18px 16px; box-shadow: var(--shadow); }
  .feature-card .emoji { font-size: 24px; margin-bottom: 8px; }
  .feature-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .feature-card p { font-size: 12px; color: var(--gray); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 0; }

  /* FAB */
  .fab {
    position: fixed; bottom: 90px; right: calc(50% - 200px);
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--pink); color: #fff; font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(242,96,138,0.45);
    cursor: pointer; z-index: 150; border: none;
    transition: all .18s;
  }
  .fab:hover { transform: scale(1.1) rotate(90deg); }

  @media (max-width: 430px) {
    .fab { right: 16px; }
  }
</style>
</head>

// ============================================================
// HELPERS
// ============================================================
function showToast(msg, emoji = '✅') {
  const t = document.getElementById('toast');
  t.textContent = emoji + ' ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function showConfetti() {
  const c = document.getElementById('confetti');
  const colors = ['#F2608A','#7B8C4E','#7AA4C0','#F7F3EC','#2A2825'];
  c.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.8 + 's';
    p.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML = '', 3000);
}

function openModal(html) {
  const overlay = document.getElementById('modal');
  document.getElementById('modal-content').innerHTML = '<div class="modal-handle"></div>' + html;
  overlay.classList.add('open');
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function navigate(page, user) {
  if (user !== undefined) STATE.currentUser = user;
  STATE.currentPage = page;
  render();
  window.scrollTo(0, 0);
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  const page = STATE.currentPage;
  const user = STATE.currentUser ? USERS[STATE.currentUser] : null;
  const isChild = user && user.role === 'child';
  const isParent = user && user.role === 'parent';

  let topbar = '';
  let bottomNav = '';
  let fab = '';
  let content = '';

  if (page !== 'welcome' && page !== 'onboarding' && page !== '404') {
    topbar = renderTopBar(user);
    if (isChild) bottomNav = renderBottomNav();
    if (isParent) fab = `<button class="fab" onclick="showAddChoreModal()">+</button>`;
  }

  switch (page) {
    case 'welcome': content = renderWelcome(); break;
    case 'onboarding': content = renderOnboarding(); break;
    case 'child-home': content = renderChildHome(user); break;
    case 'parent-home': content = renderParentHome(user); break;
    case 'chores': content = renderChores(user); break;
    case 'chore-detail': content = renderChoreDetail(); break;
    case 'approvals': content = renderApprovals(); break;
    case 'rewards': content = renderRewards(user); break;
    case 'progress': content = renderProgress(user); break;
    case 'goals': content = renderGoals(); break;
    case 'profile': content = renderProfile(user); break;
    case '404': content = render404(); break;
    default: content = render404();
  }

  app.innerHTML = topbar + `<div class="page${page === 'welcome' || page === 'onboarding' ? ' no-bottom' : ''}">${content}</div>` + bottomNav + fab;
}

// ============================================================
// TOP BAR
// ============================================================
function renderTopBar(user) {
  const pts = user && user.role === 'child' ? `<div class="points-badge"><span class="star">★</span>${user.pointsBalance}</div>` : '';
  const backPages = ['chore-detail','approvals'];
  const back = backPages.includes(STATE.currentPage) ? `<span style="cursor:pointer;font-size:20px;margin-right:6px;" onclick="navigate(STATE.currentUser==='parent'?'parent-home':'chores')">←</span>` : '';
  return `<div class="topbar">
    <div style="display:flex;align-items:center">${back}<span class="topbar-logo">Chore<span>Points</span></span></div>
    <div class="topbar-right">
      ${pts}
      <div class="avatar-btn" onclick="navigate('profile')">${user ? user.avatar : '👤'}</div>
    </div>
  </div>`;
}

function submitChore(choreId) {
  const chore = CHORES.find(c => c.id === choreId);
  if (chore) {
    chore.status = chore.needsApproval ? 'submitted' : 'done';
    if (!chore.needsApproval) {
      USERS['child-oliver'].pointsBalance += chore.points;
      TRANSACTIONS.unshift({ id: 'new', type: 'earn', title: chore.title, amount: chore.points, date: 'Just now', childId: 'child-oliver', icon: chore.icon });
      showToast('Nice work! +' + chore.points + ' points', '🌟');
      showConfetti();
    } else {
      APPROVALS.unshift({ id: 'anew', choreId, childId: 'child-oliver', choreTitle: chore.title, submittedAt: 'Just now', status: 'pending', note: document.getElementById('completion-note')?.value || '' });
      showToast('Submitted for approval!', '📋');
    }
    render();
  }
}

function renderApprovals() {
  const pending = APPROVALS.filter(a => a.status === 'pending');
  return `<div>

      <h1 style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;">Approvals</h1>
      <p style="color:var(--gray);font-size:14px;margin-top:4px;">${pending.length} waiting for you</p>
    </div>
    ${pending.length === 0
      ? `<div class="empty-state"><div class="empty-emoji">🎉</div><div class="empty-title">All caught up!</div><div class="empty-sub">No pending approvals right now.</div></div>`
      : pending.map(a => {
          const child = USERS[a.childId];
          const chore = CHORES.find(c => c.id === a.choreId);
          return `<div class="approval-card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
              <span style="font-size:22px;">${child.avatar}</span>
              <div>
                <div style="font-weight:700;">${child.name} completed <em>${a.choreTitle}</em></div>
                <div class="approval-meta">${a.submittedAt}</div>
              </div>
              <span class="badge badge-pink" style="margin-left:auto;">+${chore?.points || 0} pts</span>
            </div>
            ${a.note ? `<div style="background:var(--gray-light);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--charcoal-mid);margin-bottom:12px;">"${a.note}"</div>` : ''}
            <div class="approval-actions">
              <button class="btn btn-primary" style="flex:2;" onclick="approveChore('${a.id}')">✓ Approve</button>
              <button class="btn btn-ghost" style="flex:1;" onclick="rejectChore('${a.id}')">✗ Reject</button>
            </div>
          </div>`;
        }).join('')
    }
    ${pending.length > 1 ? `
    <div style="padding:0 16px 20px;">
      <button class="btn btn-olive btn-block" onclick="approveAll()">✓ Approve All</button>
    </div>` : ''}
  </div>`;
}

function approveChore(id) {
  const a = APPROVALS.find(x => x.id === id);
  if (a) {
    a.status = 'approved';
    const chore = CHORES.find(c => c.id === a.choreId);
    if (chore) {
      chore.status = 'done';
      USERS[a.childId].pointsBalance += (chore.points || 0);
      TRANSACTIONS.unshift({ id: 'aprv'+id, type: 'earn', title: chore.title, amount: chore.points, date: 'Just now', childId: a.childId, icon: chore.icon });
    }
    showToast('Approved! Points added 🎉', '⭐');
    showConfetti();
    render();
  }
}

function rejectChore(id) {
  const a = APPROVALS.find(x => x.id === id);
  if (a) {
    a.status = 'rejected';
    const chore = CHORES.find(c => c.id === a.choreId);
    if (chore) chore.status = 'pending';
    showToast('Chore sent back to try again', '🔄');
    render();
  }
}

function approveAll() {
  APPROVALS.filter(a => a.status === 'pending').forEach(a => approveChore(a.id));
}

          <div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">After</div>
          <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--olive);">★ ${after}</div>
        </div>` : ''}
      </div>
      ${canAfford
        ? `<button class="btn btn-primary btn-block" onclick="redeemReward('${id}')" style="font-size:17px;padding:18px;">Redeem Now 🎉</button>`
        : `<div style="background:var(--pink-light);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:16px;">
            <div style="font-weight:700;color:var(--pink-dark);">Need ${reward.cost - balance} more points</div>

           </div>
           <button class="btn btn-ghost btn-block" onclick="closeModal()">Close</button>`
      }
    </div>`);
}

function redeemReward(id) {
  const reward = REWARDS.find(r => r.id === id);
  const user = USERS[STATE.currentUser];
  if (user && user.pointsBalance >= reward.cost) {
    user.pointsBalance -= reward.cost;
    TRANSACTIONS.unshift({ id: 'red'+id, type: 'spend', title: reward.title, amount: -reward.cost, date: 'Just now', childId: STATE.currentUser, icon: reward.icon });
    closeModal();
    showToast('Enjoy your reward!', reward.icon);
    showConfetti();
    render();
  }
}

      </div>
    </div>

    <div style="padding:0 16px;">
      <div style="background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Switch User</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${Object.values(USERS).map(u => `
            <button class="btn ${u.id===user.id?'btn-primary':'btn-ghost'} btn-block btn-sm" onclick="navigate(${u.role==='parent'?'\'parent-home\'':'\'child-home\''},'${u.id}')">
              ${u.avatar} ${u.name} ${u.role==='parent'?'(Parent)':''}

      </div>
      <button class="btn btn-ghost btn-block" onclick="navigate('welcome',null)" style="color:var(--pink);font-size:13px;margin-bottom:20px;">← Back to Welcome</button>

  </div>`;
}

// Fix chart bars after render
function fixChartBars() {
  document.querySelectorAll('.chart-bar').forEach((bar, i) => {
    const maxPts = Math.max(...WEEK_DATA.map(d=>d.pts));
    bar.style.height = Math.round((WEEK_DATA[i].pts/maxPts)*76) + 'px';
  });
}
const origRender = render;
function render() {
  origRender.call(this);
  setTimeout(fixChartBars, 0);
}
render();
